<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Access</title>
  <style>
    :root {
      --bg-base: #050d1b;
      --bg-surface: #0c1829;
      --bg-elevated: #111f38;
      --bg-hover: #162840;
      --border-subtle: #1e3a5f;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --primary-glow: rgba(59, 130, 246, 0.18);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 2rem;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.3px;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      font-size: 13px;
      color: var(--text-secondary);
    }

    input[type="password"],
    input[type="number"] {
      width: 100%;
      padding: 0.7rem 0.85rem;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      background: var(--bg-elevated);
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="password"]:focus,
    input[type="number"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    input[type="checkbox"] {
      accent-color: var(--primary);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .button {
      width: 100%;
      padding: 0.7rem;
      border: 1px solid var(--primary);
      border-radius: var(--radius-md);
      background: var(--primary);
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s;
      font-family: inherit;
    }

    .button:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .button:disabled {
      background: var(--bg-elevated);
      border-color: var(--border-subtle);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .error {
      color: var(--danger);
      margin-top: 0.5rem;
      font-size: 0.85rem;
    }

    .success {
      color: var(--success);
      margin-top: 0.5rem;
      font-size: 0.85rem;
    }

    .hidden {
      display: none;
    }

    .tabs {
      display: flex;
      margin-bottom: 1rem;
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 3px;
      gap: 3px;
    }

    .tab {
      flex: 1;
      padding: 0.55rem;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-radius: 6px;
      transition: all 0.15s;
      font-family: inherit;
    }

    .tab:hover {
      color: var(--text-primary);
      background: var(--bg-elevated);
    }

    .tab.active {
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .file-input {
      display: none;
    }

    .file-label {
      display: block;
      width: 100%;
      padding: 0.75rem;
      border: 2px dashed var(--border-subtle);
      border-radius: var(--radius-md);
      text-align: center;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      transition: border-color 0.2s, background 0.15s;
    }

    .file-label:hover {
      border-color: var(--primary);
      background: var(--bg-hover);
      color: var(--primary);
    }

    .passkey-list {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 0.25rem;
      margin: 1rem 0;
      background: var(--bg-elevated);
    }

    .passkey-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0.6rem;
      border-bottom: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      transition: background 0.15s;
    }

    .passkey-item:last-child {
      border-bottom: none;
    }

    .passkey-item:hover {
      background: var(--bg-hover);
    }

    .passkey-info {
      flex: 1;
    }

    .passkey-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
    }

    .passkey-rp {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .delete-button {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 0.25rem 0.6rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }

    .delete-button:hover {
      background: var(--danger);
      border-color: var(--danger);
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🔐 Emergency Access</h1>
    </div>

    <div id="login-form">
      <div class="form-group">
        <label for="master-password">Master Password</label>
        <input type="password" id="master-password" placeholder="Enter your master password">
      </div>
      <button class="button" id="unlock-button">Unlock</button>
      <div id="auth-error" class="error hidden"></div>
    </div>

    <div id="main-interface" class="hidden">
      <div class="tabs">
        <button class="tab active" data-tab="passkeys">Passkeys</button>
        <button class="tab" data-tab="backup">Backup</button>
        <button class="tab" data-tab="settings">Settings</button>
      </div>

      <div id="passkeys-tab" class="tab-content active">
        <h3>Stored Passkeys</h3>
        <div id="passkey-list" class="passkey-list">
          <!-- Passkeys will be populated here -->
        </div>
        <button class="button" id="refresh-passkeys">Refresh</button>
      </div>

      <div id="backup-tab" class="tab-content">
        <h3>Backup & Restore</h3>

        <div class="form-group">
          <button class="button" id="create-backup">Create Backup</button>
          <button class="button" id="download-backup" style="margin-top: 0.5rem;">Download Last Backup</button>
        </div>

        <div class="form-group">
          <label class="file-label" for="backup-file">
            Choose Backup File to Restore
          </label>
          <input type="file" id="backup-file" class="file-input" accept=".json,.backup">
        </div>

        <button class="button" id="restore-backup" style="margin-top: 1rem;">Restore from File</button>
        <div id="backup-status" class="success hidden"></div>
      </div>

      <div id="settings-tab" class="tab-content">
        <h3>Security Settings</h3>

        <div class="form-group">
          <label>
            <input type="checkbox" id="auto-backup"> Enable automatic backups
          </label>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" id="biometric-auth"> Enable biometric authentication
          </label>
        </div>

        <div class="form-group">
          <label for="lock-timeout">Auto-lock timeout (minutes)</label>
          <input type="number" id="lock-timeout" value="30" min="1" max="1440">
        </div>

        <button class="button" id="save-settings">Save Settings</button>
        <button class="button" id="change-master-password" style="margin-top: 0.5rem; background: #ff9f43;">Change Master Password</button>
        <button class="button" id="emergency-wipe" style="margin-top: 0.5rem; background: #ff6b6b;">Emergency Wipe</button>
        <div id="settings-status" class="success hidden"></div>
      </div>
    </div>
  </div>

  <script src="emergency-ui.js"></script>
</body>
</html>

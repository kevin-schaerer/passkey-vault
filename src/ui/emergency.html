<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Access – PassKey Vault</title>
  <link rel="icon" type="image/png" sizes="48x48" href="icons/icon48.png" />
  <style>
    /* ── Design tokens ── */
    :root {
      --bg-base:        #040d1a;
      --bg-surface:     #071527;
      --bg-elevated:    #0d2040;
      --bg-hover:       #112849;
      --border-subtle:  #1a3a60;
      --primary:        #3b82f6;
      --primary-hover:  #2563eb;
      --primary-glow:   rgba(59,130,246,0.20);
      --accent:         #60a5fa;
      --text-primary:   #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted:     #4e6680;
      --success:        #10b981;
      --success-bg:     rgba(16,185,129,0.10);
      --success-border: rgba(16,185,129,0.30);
      --danger:         #f87171;
      --danger-bg:      rgba(248,113,113,0.10);
      --danger-border:  rgba(248,113,113,0.30);
      --warning:        #fbbf24;
      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-lg:  14px;
      --radius-xl:  18px;
      --shadow-md:  0 8px 32px rgba(0,0,0,0.55);
      --shadow-glow:0 0 0 3px var(--primary-glow);
      --transition: 160ms ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }

    /* ── Card header ── */
    .card-header {
      padding: 24px 24px 20px;
      background: linear-gradient(160deg, #081a34 0%, #071527 100%);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card-header-icon {
      width: 40px;
      height: 40px;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .card-header-text h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .card-header-text p {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ── Card body ── */
    .card-body { padding: 22px 24px; }

    /* ── Form ── */
    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    input[type="password"],
    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    input[type="password"]:focus,
    input[type="number"]:focus,
    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: var(--shadow-glow);
    }

    input[type="checkbox"] {
      accent-color: var(--primary);
      width: 14px;
      height: 14px;
      cursor: pointer;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* ── Buttons ── */
    .button {
      width: 100%;
      padding: 10px 16px;
      border: 1px solid var(--primary);
      border-radius: var(--radius-sm);
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .button:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .button:disabled {
      background: var(--bg-elevated);
      border-color: var(--border-subtle);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .button + .button { margin-top: 8px; }

    .button.secondary {
      background: var(--bg-elevated);
      border-color: var(--border-subtle);
      color: var(--text-primary);
    }

    .button.secondary:hover {
      background: var(--bg-hover);
      border-color: var(--primary);
      color: var(--accent);
    }

    .button.warning-btn {
      background: rgba(251,191,36,0.12);
      border-color: rgba(251,191,36,0.35);
      color: var(--warning);
    }

    .button.warning-btn:hover {
      background: rgba(251,191,36,0.22);
    }

    .button.danger-btn {
      background: var(--danger-bg);
      border-color: var(--danger-border);
      color: var(--danger);
    }

    .button.danger-btn:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }

    /* ── Feedback messages ── */
    .error {
      color: var(--danger);
      font-size: 12px;
      margin-top: 6px;
      line-height: 1.4;
    }

    .success {
      color: var(--success);
      font-size: 12px;
      margin-top: 6px;
      line-height: 1.4;
    }

    .hidden { display: none; }

    /* ── Tab nav ── */
    .tabs {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 3px;
    }

    .tab {
      flex: 1;
      padding: 6px 10px;
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .tab:hover {
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    .tab.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 8px rgba(59,130,246,0.35);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .tab-content h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    /* ── File input ── */
    .file-input { display: none; }

    .file-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      border: 2px dashed var(--border-subtle);
      border-radius: var(--radius-md);
      text-align: center;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      transition: border-color var(--transition), background var(--transition);
    }

    .file-label:hover {
      border-color: var(--primary);
      background: rgba(59,130,246,0.05);
      color: var(--accent);
    }

    /* ── Passkey list ── */
    .passkey-list {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      background: var(--bg-elevated);
      margin: 10px 0 12px;
    }

    .passkey-list::-webkit-scrollbar { width: 5px; }
    .passkey-list::-webkit-scrollbar-track { background: var(--bg-elevated); }
    .passkey-list::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }

    .passkey-item {
      display: flex;
      align-items: center;
      padding: 9px 12px;
      border-bottom: 1px solid var(--border-subtle);
      transition: background var(--transition);
      gap: 10px;
    }

    .passkey-item:last-child { border-bottom: none; }
    .passkey-item:hover { background: var(--bg-hover); }

    .passkey-info { flex: 1; min-width: 0; }

    .passkey-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .passkey-rp {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .delete-button {
      flex-shrink: 0;
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid var(--danger-border);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      transition: background var(--transition), color var(--transition);
    }

    .delete-button:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 16px 0;
    }

    /* ── Settings row ── */
    .setting-row {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .setting-row:last-child { border-bottom: none; }

    .setting-label {
      flex: 1;
      font-size: 13px;
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon">🔐</div>
      <div class="card-header-text">
        <h1>Emergency Access</h1>
        <p>Unlock with your master password</p>
      </div>
    </div>

    <div class="card-body">
      <!-- Login form -->
      <div id="login-form">
        <div class="form-group">
          <label for="master-password">Master Password</label>
          <input type="password" id="master-password" placeholder="Enter your master password" />
        </div>
        <button class="button" id="unlock-button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          Unlock Vault
        </button>
        <div id="auth-error" class="error hidden"></div>
      </div>

      <!-- Main interface (shown after unlock) -->
      <div id="main-interface" class="hidden">
        <div class="tabs">
          <button class="tab active" data-tab="passkeys">Passkeys</button>
          <button class="tab" data-tab="backup">Backup</button>
          <button class="tab" data-tab="settings">Settings</button>
        </div>

        <!-- Passkeys tab -->
        <div id="passkeys-tab" class="tab-content active">
          <h3>Stored Passkeys</h3>
          <div id="passkey-list" class="passkey-list">
            <!-- Populated by JS -->
          </div>
          <button class="button secondary" id="refresh-passkeys">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 4v6h-6"></path>
              <path d="M1 20v-6h6"></path>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
            Refresh
          </button>
        </div>

        <!-- Backup tab -->
        <div id="backup-tab" class="tab-content">
          <h3>Backup &amp; Restore</h3>

          <div class="form-group">
            <button class="button" id="create-backup">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
              Create Backup
            </button>
            <button class="button secondary" id="download-backup">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
              Download Last Backup
            </button>
          </div>

          <div class="divider"></div>

          <div class="form-group">
            <label class="file-label" for="backup-file">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                <polyline points="13 2 13 9 20 9"></polyline>
              </svg>
              Choose Backup File to Restore
            </label>
            <input type="file" id="backup-file" class="file-input" accept=".json,.backup" />
          </div>

          <button class="button secondary" id="restore-backup">Restore from File</button>
          <div id="backup-status" class="success hidden"></div>
        </div>

        <!-- Settings tab -->
        <div id="settings-tab" class="tab-content">
          <h3>Security Settings</h3>

          <div class="setting-row">
            <span class="setting-label">Automatic backups</span>
            <input type="checkbox" id="auto-backup" />
          </div>

          <div class="setting-row">
            <span class="setting-label">Biometric authentication</span>
            <input type="checkbox" id="biometric-auth" />
          </div>

          <div class="form-group" style="margin-top:12px">
            <label for="lock-timeout">Auto-lock timeout (minutes)</label>
            <input type="number" id="lock-timeout" value="30" min="1" max="1440" />
          </div>

          <button class="button" id="save-settings">Save Settings</button>
          <button class="button warning-btn" id="change-master-password">Change Master Password</button>
          <button class="button danger-btn" id="emergency-wipe">Emergency Wipe</button>
          <div id="settings-status" class="success hidden"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="emergency-ui.js"></script>
</body>
</html>

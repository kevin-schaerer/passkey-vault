<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Import Passkeys – PassKey Vault</title>
    <link rel="icon" type="image/png" sizes="48x48" href="icons/icon48.png" />
    <style>
      /* ── Design tokens ── */
      :root {
        --bg-base:        #040d1a;
        --bg-surface:     #071527;
        --bg-elevated:    #0d2040;
        --bg-hover:       #112849;
        --border-subtle:  #1a3a60;
        --primary:        #3b82f6;
        --primary-hover:  #2563eb;
        --primary-glow:   rgba(59,130,246,0.20);
        --accent:         #60a5fa;
        --text-primary:   #e2e8f0;
        --text-secondary: #94a3b8;
        --text-muted:     #4e6680;
        --success:        #10b981;
        --success-bg:     rgba(16,185,129,0.10);
        --success-border: rgba(16,185,129,0.30);
        --danger:         #f87171;
        --danger-bg:      rgba(248,113,113,0.10);
        --danger-border:  rgba(248,113,113,0.30);
        --warning:        #fbbf24;
        --warning-bg:     rgba(251,191,36,0.10);
        --warning-border: rgba(251,191,36,0.30);
        --radius-sm:  6px;
        --radius-md:  10px;
        --radius-lg:  14px;
        --radius-xl:  18px;
        --shadow-md:  0 8px 32px rgba(0,0,0,0.55);
        --shadow-glow:0 0 0 3px var(--primary-glow);
        --transition: 160ms ease;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        color: var(--text-primary);
        background: var(--bg-base);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }

      .card {
        background: var(--bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-xl);
        width: 100%;
        max-width: 480px;
        overflow: hidden;
        box-shadow: var(--shadow-md);
      }

      /* ── Header ── */
      .card-header {
        padding: 28px 28px 22px;
        background: linear-gradient(160deg, #081a34 0%, #071527 100%);
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .card-header-icon {
        width: 44px;
        height: 44px;
        background: rgba(59,130,246,0.12);
        border: 1px solid rgba(59,130,246,0.25);
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--accent);
        flex-shrink: 0;
      }

      .card-header-text h1 {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 3px;
      }

      .card-header-text p {
        font-size: 13px;
        color: var(--text-secondary);
      }

      /* ── Body ── */
      .card-body {
        padding: 24px 28px;
      }

      /* ── Drop zone ── */
      .drop-zone {
        border: 2px dashed var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 40px 20px;
        text-align: center;
        cursor: pointer;
        transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
        background: var(--bg-elevated);
      }

      .drop-zone:hover,
      .drop-zone.drag-over {
        border-color: var(--primary);
        background: var(--bg-hover);
        box-shadow: var(--shadow-glow);
      }

      .drop-zone-icon {
        font-size: 40px;
        margin-bottom: 14px;
        display: block;
      }

      .drop-zone h3 {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 6px;
      }

      .drop-zone p {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 16px;
      }

      .drop-zone input[type='file'] { display: none; }

      /* ── Buttons ── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px 18px;
        border: 1px solid transparent;
        border-radius: var(--radius-sm);
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition);
        line-height: 1;
      }

      .btn-primary {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }

      .btn-primary:hover {
        background: var(--primary-hover);
        border-color: var(--primary-hover);
      }

      .btn-secondary {
        background: var(--bg-elevated);
        color: var(--text-primary);
        border-color: var(--border-subtle);
      }

      .btn-secondary:hover {
        background: var(--bg-hover);
        border-color: var(--primary);
        color: var(--accent);
      }

      /* ── Status ── */
      .status {
        display: none;
        margin-top: 16px;
        padding: 12px 16px;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 500;
        line-height: 1.5;
      }

      .status.success { display: block; background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
      .status.error   { display: block; background: var(--danger-bg);  color: var(--danger);  border: 1px solid var(--danger-border); }
      .status.info    { display: block; background: rgba(59,130,246,0.08); color: var(--accent); border: 1px solid rgba(59,130,246,0.25); }

      /* ── Preview ── */
      .preview { display: none; margin-top: 20px; }
      .preview.visible { display: block; }

      .preview-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .preview-list {
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        overflow: hidden;
        max-height: 220px;
        overflow-y: auto;
        background: var(--bg-elevated);
      }

      .preview-list::-webkit-scrollbar { width: 5px; }
      .preview-list::-webkit-scrollbar-track { background: var(--bg-elevated); }
      .preview-list::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }

      .preview-item {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        transition: background var(--transition);
      }

      .preview-item:last-child { border-bottom: none; }
      .preview-item:hover { background: var(--bg-hover); }

      .preview-item-info { min-width: 0; }

      .preview-item-site {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .preview-item-user {
        font-size: 11px;
        color: var(--text-secondary);
        margin-top: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .preview-item-status {
        flex-shrink: 0;
        font-size: 10px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 20px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }

      .preview-item-status.new       { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
      .preview-item-status.duplicate { background: var(--warning-bg); color: var(--warning); border: 1px solid var(--warning-border); }

      /* ── Actions ── */
      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }

      .actions.hidden { display: none; }

      /* ── Footer ── */
      .card-footer {
        padding: 14px 28px;
        background: var(--bg-elevated);
        border-top: 1px solid var(--border-subtle);
        text-align: center;
      }

      .card-footer a {
        font-size: 12px;
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 500;
        transition: color var(--transition);
      }

      .card-footer a:hover { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <div class="card-header-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
        </div>
        <div class="card-header-text">
          <h1>Import Passkeys</h1>
          <p>Restore passkeys from a backup file</p>
        </div>
      </div>

      <div class="card-body">
        <div class="drop-zone" id="drop-zone">
          <span class="drop-zone-icon" role="img" aria-label="File upload">📂</span>
          <h3>Drop your backup file here</h3>
          <p>Accepts PassKey Vault JSON backup files</p>
          <input type="file" id="file-input" accept=".json,application/json" />
          <button class="btn btn-primary" id="choose-file-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
              <polyline points="13 2 13 9 20 9"></polyline>
            </svg>
            Choose File
          </button>
        </div>

        <div class="status" id="status"></div>

        <div class="preview" id="preview">
          <p class="preview-label">Passkeys to import</p>
          <div class="preview-list" id="preview-list"></div>
        </div>

        <div class="actions hidden" id="actions">
          <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
          <button class="btn btn-primary" id="import-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            Import All
          </button>
        </div>
      </div>

      <div class="card-footer">
        <a href="#" id="close-link">Close this tab</a>
      </div>
    </div>

    <script src="import.js"></script>
  </body>
</html>
